<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Magnetberechnung</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  background:
    radial-gradient(circle at 30% 20%, rgba(80,120,255,.35), transparent 30%),
    radial-gradient(circle at 80% 70%, rgba(0,255,195,.18), transparent 28%),
    linear-gradient(180deg, #070b16 0%, #0b1020 100%);
  color:#fff;
  min-height:100dvh;
}

.app{
  width:100vw;
  min-height:100dvh;
  display:flex;
  flex-direction:column;
  padding:clamp(10px, 2vw, 18px);
  gap:14px;
}

h1{
  text-align:center;
  font-size:clamp(1.2rem,3vw,1.6rem);
}

/* FRAME */
.frame{
  border:1px solid rgba(255,255,255,.12);
  border-radius:20px;
  padding:10px;
  background:rgba(255,255,255,.04);
  backdrop-filter:blur(12px);
}

/* SEGMENTED */
.segmented{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}
.segmented input{display:none}

.segmented label{
  padding:12px;
  border-radius:16px;
  text-align:center;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.1);
  cursor:pointer;
}

.segmented input:checked + label{
  background:linear-gradient(135deg,#6ea8ff,#00ffc3);
  color:#000;
}

/* INPUTS */

.row + .row{
  margin-top:14px;
}

.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

input{
  padding:14px;
  border-radius:14px;
  border:none;
  background:rgba(255,255,255,.05);
  color:#fff;
  text-align:center;
}

/* RESULTS */
.results{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.result{
  padding:16px;
  border-radius:16px;
  background:rgba(255,255,255,.05);
  text-align:center;
}

.big{grid-column:1/-1}

.value{
  font-size:1.4rem;
  margin-top:6px;
}
</style>
</head>

<body>

<div class="app">

<h1>Magnetberechnung</h1>

<div class="frame">
  <div class="segmented">
    <input type="radio" name="mat" id="cu" checked>
    <label for="cu">Kupfer</label>
    <input type="radio" name="mat" id="al">
    <label for="al">Aluminium</label>
  </div>
</div>

<div class="frame">
  <div class="row">
    <input id="uc" placeholder="U kalt">
    <input id="ic" placeholder="I kalt">
  </div>
  <div class="row">
    <input id="uw" placeholder="U warm">
    <input id="iw" placeholder="I warm">
  </div>
</div>

<div class="frame">
  <div class="results">
    <div class="result"><div>R kalt</div><div class="value" id="rc">-</div></div>
    <div class="result"><div>P kalt</div><div class="value" id="pc">-</div></div>
    <div class="result"><div>R warm</div><div class="value" id="rw">-</div></div>
    <div class="result"><div>P warm</div><div class="value" id="pw">-</div></div>
    <div class="result big"><div>ΔT</div><div class="value" id="dt">-</div></div>
  </div>
</div>

</div>

<script>
function kW(v){return (v/1000).toFixed(2)+" kW";}

function alpha(){
  return document.getElementById('al').checked ? 0.00429 : 0.00393;
}

function calc(){
  let uc=+ucEl.value, ic=+icEl.value, uw=+uwEl.value, iw=+iwEl.value;
  if(!uc||!ic||!uw||!iw) return;

  let rc=uc/ic;
  let rw=uw/iw;

  rcEl.innerText=rc.toFixed(3)+" Ω";
  rwEl.innerText=rw.toFixed(3)+" Ω";

  pcEl.innerText=kW(uc*ic);
  pwEl.innerText=kW(uw*iw);

  let dt=(1/alpha())*((rw/rc)-1);
  dtEl.innerText=dt.toFixed(1)+" °C";
}

const ucEl=document.getElementById('uc');
const icEl=document.getElementById('ic');
const uwEl=document.getElementById('uw');
const iwEl=document.getElementById('iw');

const rcEl=document.getElementById('rc');
const rwEl=document.getElementById('rw');
const pcEl=document.getElementById('pc');
const pwEl=document.getElementById('pw');
const dtEl=document.getElementById('dt');

[ucEl,icEl,uwEl,iwEl].forEach(el=>{
  el.addEventListener('input',calc);
});

document.getElementById('cu').addEventListener('change',calc);
document.getElementById('al').addEventListener('change',calc);
</script>

</body>
</html>
