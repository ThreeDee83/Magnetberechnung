<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Magnetberechnung</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:system-ui;
  background:radial-gradient(circle at 30% 20%, #1a2a6c, #0b1020 60%);
  color:#fff;
  min-height:100dvh;
  display:flex;
  justify-content:center;
}

/* AUTOSCALE HEIGHT */
.app{
  width:100%;
  max-width:480px;
  min-height:100dvh;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  padding:clamp(12px,2vh,20px);
  gap:clamp(12px,2vh,18px);
}

h1{
  text-align:center;
  font-size:clamp(1.2rem,3vw,1.6rem);
}

/* FRAME */
.frame{
  border:1px solid rgba(255,255,255,.12);
  border-radius:20px;
  padding:clamp(10px,2vh,16px);
  background:rgba(255,255,255,.04);
  backdrop-filter:blur(12px);
}

/* SEGMENTED */
.segmented{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}
.segmented input{display:none}
.segmented label{
  padding:clamp(12px,2vh,16px);
  border-radius:16px;
  text-align:center;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.1);
  cursor:pointer;
}
.segmented input:checked + label{
  background:linear-gradient(135deg,#6ea8ff,#00ffc3);
  color:#000;
}

/* INPUTS */
.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:clamp(8px,1.5vw,14px);
}
.row + .row{
  margin-top:clamp(12px,2vh,20px);
}

input{
  padding:clamp(12px,2vh,18px);
  border-radius:14px;
  border:none;
  background:rgba(255,255,255,.05);
  color:#fff;
  text-align:center;
  font-size:clamp(0.9rem,2.5vw,1.1rem);
}

/* RESULTS */
.results{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:clamp(10px,1.5vw,16px);
}

.result{
  padding:clamp(14px,2vh,22px);
  border-radius:16px;
  background:rgba(255,255,255,.05);
  text-align:center;
}

.big{grid-column:1/-1}

.value{
  font-size:clamp(1.2rem,4vw,1.8rem);
  margin-top:6px;
}
</style>
</head>

<body>

<div class="app">

<h1>Magnetberechnung</h1>

<div class="frame">
  <div class="segmented">
    <input type="radio" name="mat" id="cu" checked>
    <label for="cu">Kupfer</label>
    <input type="radio" name="mat" id="al">
    <label for="al">Aluminium</label>
  </div>
</div>

<div class="frame">
  <div class="row">
    <input id="uc" placeholder="U kalt">
    <input id="ic" placeholder="I kalt">
  </div>
  <div class="row">
    <input id="uw" placeholder="U warm">
    <input id="iw" placeholder="I warm">
  </div>
</div>

<div class="frame">
  <div class="results">
    <div class="result"><div>R kalt</div><div class="value" id="rc">-</div></div>
    <div class="result"><div>P kalt</div><div class="value" id="pc">-</div></div>
    <div class="result"><div>R warm</div><div class="value" id="rw">-</div></div>
    <div class="result"><div>P warm</div><div class="value" id="pw">-</div></div>
    <div class="result big"><div>ΔT</div><div class="value" id="dt">-</div></div>
  </div>
</div>

</div>

<script>
function kW(v){return (v/1000).toFixed(2)+" kW";}
function alpha(){return document.getElementById('al').checked ? 0.00429 : 0.00393;}

function calc(){
  let uc=+ucEl.value, ic=+icEl.value, uw=+uwEl.value, iw=+iwEl.value;
  if(!uc||!ic||!uw||!iw) return;

  let rc=uc/ic;
  let rw=uw/iw;

  rcEl.innerText=rc.toFixed(3)+" Ω";
  rwEl.innerText=rw.toFixed(3)+" Ω";

  pcEl.innerText=kW(uc*ic);
  pwEl.innerText=kW(uw*iw);

  let dt=(1/alpha())*((rw/rc)-1);
  dtEl.innerText=dt.toFixed(1)+" °C";
}

const ucEl=document.getElementById('uc');
const icEl=document.getElementById('ic');
const uwEl=document.getElementById('uw');
const iwEl=document.getElementById('iw');

const rcEl=document.getElementById('rc');
const rwEl=document.getElementById('rw');
const pcEl=document.getElementById('pc');
const pwEl=document.getElementById('pw');
const dtEl=document.getElementById('dt');

[ucEl,icEl,uwEl,iwEl].forEach(el=>el.addEventListener('input',calc));
document.getElementById('cu').addEventListener('change',calc);
document.getElementById('al').addEventListener('change',calc);
</script>

</body>
</html>
