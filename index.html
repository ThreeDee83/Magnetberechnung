<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Magnetberechnung</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  background:
    radial-gradient(circle at 30% 20%, rgba(80,120,255,.35), transparent 30%),
    radial-gradient(circle at 80% 70%, rgba(0,255,195,.18), transparent 28%),
    linear-gradient(180deg, #070b16 0%, #0b1020 100%);
  color:#fff;
  min-height:100dvh;
}

.app{
  width:100vw;
  min-height:100dvh;
  display:flex;
  flex-direction:column;
  padding:clamp(10px, 2vw, 18px);
  gap:clamp(10px,2vh,18px);
}

h1{
  text-align:center;
  font-size:clamp(1.2rem,3vw,1.6rem);
  letter-spacing:.04em;
  text-shadow:0 0 16px rgba(110,168,255,.28);
}

.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:clamp(8px,1.5vw,14px);
}

input{
  padding:clamp(12px,2vh,18px);
  border-radius:18px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(255,255,255,.055);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.05),
    0 0 0 1px rgba(255,255,255,.02);
  backdrop-filter:blur(10px);
  color:#fff;
  font-size:clamp(0.95rem,2.5vw,1.1rem);
  font-weight:700;
  text-align:center;
  outline:none;
}
input::placeholder{color:rgba(255,255,255,.45)}
input:focus{
  border-color:rgba(110,168,255,.55);
  box-shadow:0 0 0 3px rgba(110,168,255,.16);
}

.results{
  flex:1;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:clamp(10px,1.5vw,16px);
  min-height:0;
}

.result{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.10);
  border-radius:22px;
  padding:clamp(14px,2vh,24px);
  backdrop-filter:blur(14px);
  box-shadow:
    0 14px 28px rgba(0,0,0,.24),
    inset 0 1px 0 rgba(255,255,255,.05);
}

.big{grid-column:1/-1}

.label{
  font-size:clamp(0.8rem,2vw,1rem);
  color:rgba(255,255,255,.72);
  letter-spacing:.02em;
}

.value{
  font-size:clamp(1.2rem,4vw,2rem);
  font-weight:900;
  margin-top:8px;
  text-shadow:0 0 14px rgba(110,168,255,.14);
}

.status{
  text-align:center;
  min-height:1.25rem;
  font-size:clamp(.8rem,2vw,.95rem);
  color:rgba(255,255,255,.62);
}

@media (orientation:landscape){
  .app{
    max-width:1000px;
    margin:0 auto;
  }
}
</style>
</head>

<body>
<div class="app">
  <h1>Magnetberechnung</h1>

  <div class="row">
    <input id="uc" type="number" step="any" inputmode="decimal" placeholder="U kalt">
    <input id="ic" type="number" step="any" inputmode="decimal" placeholder="I kalt">
  </div>

  <div class="row">
    <input id="uw" type="number" step="any" inputmode="decimal" placeholder="U warm">
    <input id="iw" type="number" step="any" inputmode="decimal" placeholder="I warm">
  </div>

  <div class="results">
    <div class="result"><div class="label">R kalt</div><div class="value" id="rc">-</div></div>
    <div class="result"><div class="label">P kalt</div><div class="value" id="pc">-</div></div>
    <div class="result"><div class="label">R warm</div><div class="value" id="rw">-</div></div>
    <div class="result"><div class="label">P warm</div><div class="value" id="pw">-</div></div>
    <div class="result big"><div class="label">ΔT</div><div class="value" id="dt">-</div></div>
  </div>

  <div class="status" id="status">Live-Berechnung aktiv</div>
</div>

<script>
const ucEl=document.getElementById('uc');
const icEl=document.getElementById('ic');
const uwEl=document.getElementById('uw');
const iwEl=document.getElementById('iw');

const rcEl=document.getElementById('rc');
const rwEl=document.getElementById('rw');
const pcEl=document.getElementById('pc');
const pwEl=document.getElementById('pw');
const dtEl=document.getElementById('dt');
const statusEl=document.getElementById('status');

function kW(v){
  return (v/1000).toLocaleString('de-DE',{
    minimumFractionDigits:2,
    maximumFractionDigits:2
  }) + " kW";
}

function resetResults(){
  rcEl.innerText="-";
  rwEl.innerText="-";
  pcEl.innerText="-";
  pwEl.innerText="-";
  dtEl.innerText="-";
}

function calc(){
  const uc=parseFloat(ucEl.value);
  const ic=parseFloat(icEl.value);
  const uw=parseFloat(uwEl.value);
  const iw=parseFloat(iwEl.value);

  if([uc,ic,uw,iw].some(v => Number.isNaN(v))){
    resetResults();
    statusEl.innerText="Live-Berechnung aktiv";
    return;
  }

  if([uc,ic,uw,iw].some(v => v <= 0)){
    resetResults();
    statusEl.innerText="Bitte nur positive Werte eingeben";
    return;
  }

  const rc=uc/ic;
  const rw=uw/iw;
  const pc=uc*ic;
  const pw=uw*iw;
  const dt=(rw-rc)/(0.00393*rc);

  rcEl.innerText=rc.toLocaleString('de-DE',{minimumFractionDigits:3,maximumFractionDigits:3})+" Ω";
  rwEl.innerText=rw.toLocaleString('de-DE',{minimumFractionDigits:3,maximumFractionDigits:3})+" Ω";
  pcEl.innerText=kW(pc);
  pwEl.innerText=kW(pw);
  dtEl.innerText=dt.toLocaleString('de-DE',{minimumFractionDigits:1,maximumFractionDigits:1})+" °C";
  statusEl.innerText="Berechnung aktualisiert";
}

[ucEl,icEl,uwEl,iwEl].forEach(el => {
  el.addEventListener('input', calc);
  el.addEventListener('change', calc);
});

resetResults();
</script>
</body>
</html>
